# 카나리 배포: session-service v1 → v2 점진적 전환
# 90%의 트래픽은 v1으로, 10%는 v2로 라우팅
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: session-service
  namespace: conference
spec:
  hosts:
    - session-service
  http:
    - match:
        - headers:
            x-api-version:
              exact: "v2"
      route:
        - destination:
            host: session-service
            subset: v2
    - route:
        - destination:
            host: session-service
            subset: v1
          weight: 90
        - destination:
            host: session-service
            subset: v2
          weight: 10
---
# Gateway Ingress 설정
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: conference-gateway
  namespace: conference
spec:
  hosts:
    - "conference.example.com"
  gateways:
    - conference-gateway
  http:
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: gateway
            port:
              number: 8080
