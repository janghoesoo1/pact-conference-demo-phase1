server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: attendee-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/attendees/**
          - id: session-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/sessions/**
          - id: cfp-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/proposals/**
          - id: session-service-v1
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/sessions/**
          - id: session-service-v2
            uri: http://localhost:8082
            predicates:
              - Path=/api/v2/sessions/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
