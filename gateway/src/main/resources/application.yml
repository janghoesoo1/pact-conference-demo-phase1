server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: attendee-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/attendees/**
          - id: session-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/sessions/**
          - id: cfp-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/proposals/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
