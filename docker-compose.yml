services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pact}
      POSTGRES_DB: ${POSTGRES_DB:-pact_broker}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pact}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pact-broker:
    image: pactfoundation/pact-broker:2.113.1.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PACT_BROKER_DATABASE_URL: "postgres://${POSTGRES_USER:-pact}:${POSTGRES_PASSWORD:-pact}@postgres/${POSTGRES_DB:-pact_broker}"
      PACT_BROKER_BASIC_AUTH_USERNAME: ${PACT_BROKER_USERNAME:-pact}
      PACT_BROKER_BASIC_AUTH_PASSWORD: ${PACT_BROKER_PASSWORD:-pact}
      PACT_BROKER_LOG_LEVEL: INFO
    ports:
      - "9292:9292"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
